server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${SPRING_DATASOURCE_USERNAME:tracker}
    password: ${SPRING_DATASOURCE_PASSWORD:tracker}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:change-me-in-prod-this-must-be-at-least-32-bytes-long}
  access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
  refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.tracker: INFO
