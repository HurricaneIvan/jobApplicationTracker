<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="globe" cx="0.4" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#6d7bff"/>
      <stop offset="0.55" stop-color="#3a2a8f"/>
      <stop offset="1" stop-color="#180f3a"/>
    </radialGradient>
    <linearGradient id="fur" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#ffe95e"/>
      <stop offset="0.34" stop-color="#ff9f1c"/>
      <stop offset="0.66" stop-color="#f5402c"/>
      <stop offset="1" stop-color="#c21575"/>
    </linearGradient>
    <linearGradient id="fur2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb43a"/>
      <stop offset="0.6" stop-color="#f5522b"/>
      <stop offset="1" stop-color="#d31771"/>
    </linearGradient>
  </defs>

  <!-- globe -->
  <circle cx="32" cy="32" r="30" fill="url(#globe)"/>

  <!-- big bushy tail: scalloped fur edge on the outside, smooth inner curl -->
  <path d="M31 57
           C25 59 20 58 19 54
           C13 55 9 51 10 46
           C4 45 2 39 6 34
           C2 31 3 25 8 23
           C5 18 7 12 13 12
           C13 6 19 4 24 7
           C27 3 33 5 34 10
           C31 14 24 18 23 27
           C22 39 27 49 39 52
           C36 56 34 57 31 57 Z" fill="url(#fur)"/>

  <!-- a couple of fur strokes to suggest fluff direction -->
  <g fill="none" stroke="#d8341f" stroke-width="1.4" stroke-linecap="round" opacity="0.5">
    <path d="M14 48 C13 40 15 30 21 22"/>
    <path d="M9 40 C9 33 11 27 15 22"/>
  </g>

  <!-- body: rounded sitting haunch at the lower right, tucked under the head -->
  <path d="M29 54
           C36 57 45 56 50 50
           C55 43 54 33 48 29
           C44 26 40 27 39 31
           C43 37 42 45 36 49
           C33 50 30 52 29 54 Z" fill="url(#fur)"/>
  <!-- little front paw -->
  <ellipse cx="34" cy="52" rx="4" ry="2.6" fill="url(#fur2)"/>

  <!-- head -->
  <circle cx="43" cy="26" r="9" fill="url(#fur2)"/>
  <!-- ear (tufted) -->
  <path d="M45 15 C47 11 51 12 52 16 C50 18 47 18 45 15 Z" fill="url(#fur2)"/>
  <!-- snout -->
  <circle cx="50" cy="30" r="3.6" fill="#ffcf6b"/>

  <!-- eye + nose -->
  <circle cx="46" cy="25" r="1.9" fill="#20123a"/>
  <circle cx="52.6" cy="30" r="1.3" fill="#20123a"/>
</svg>
