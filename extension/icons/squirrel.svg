<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f7be6"/>
      <stop offset="1" stop-color="#0052cc"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- squirrel, facing right, cream on blue -->
  <g fill="#f7f1e3">
    <!-- bushy curled tail (left) -->
    <path d="M27 53
             C9 55 4 33 11 21
             C15 12 27 9 31 18
             C34 25 24 24 24 33
             C24 41 23 47 27 53 Z"/>
    <!-- body -->
    <ellipse cx="35" cy="41" rx="12" ry="15"/>
    <!-- feet -->
    <ellipse cx="35" cy="55" rx="8" ry="3.5"/>
    <!-- head -->
    <circle cx="43" cy="23" r="11"/>
    <!-- ear -->
    <path d="M45 8 L52 11 L49 20 Z"/>
    <!-- snout -->
    <circle cx="52" cy="26" r="4.5"/>
  </g>

  <!-- acorn held at chest -->
  <g>
    <ellipse cx="39" cy="43" rx="4.5" ry="5" fill="#8a5a2b"/>
    <path d="M33.5 40 a5.5 3 0 0 1 11 0 Z" fill="#5c3a17"/>
  </g>

  <!-- face details -->
  <circle cx="47" cy="21" r="2.1" fill="#20344f"/>
  <circle cx="55.5" cy="26" r="1.6" fill="#20344f"/>
</svg>
